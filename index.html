<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lea's Blog</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Georgia', serif;
    background: linear-gradient(135deg, #f8b4d9 0%, #c084fc 50%, #a855f7 100%);
    min-height: 100vh;
    padding: 40px 20px;
}
.container { max-width: 800px; margin: 0 auto; }
header { text-align: center; margin-bottom: 40px; }
header h1 { font-size: 2.5rem; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.15); }
header p { color: rgba(255,255,255,0.85); font-style: italic; margin-top: 8px; }
.toolbar {
    background: rgba(255,255,255,0.95); border-radius: 12px;
    padding: 12px 16px; margin-bottom: 20px;
    display: flex; gap: 8px; flex-wrap: wrap;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}
.toolbar button {
    background: linear-gradient(135deg, #e879a8, #a855f7);
    color: white; border: none; padding: 8px 16px;
    border-radius: 8px; cursor: pointer; font-size: 14px;
}
.toolbar button:hover { opacity: 0.85; }
.post {
    background: rgba(255,255,255,0.95); border-radius: 16px;
    padding: 30px; margin-bottom: 24px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08); position: relative;
}
.post-title { font-size: 1.5rem; color: #6b21a8; margin-bottom: 8px; outline: none; padding: 4px; }
.post-title:focus { border-bottom: 2px dashed #c084fc; }
.post-date { font-size: 0.85rem; color: #9ca3af; margin-bottom: 16px; }
.post-body {
    font-size: 1rem; line-height: 1.7; color: #374151;
    outline: none; min-height: 60px; padding: 8px;
    border: 2px dashed transparent; border-radius: 8px;
}
.post-body:focus { border-color: #e8b4f0; background: #fdf4ff; }
.post-img {
    width: 100%; max-height: 400px; object-fit: cover;
    border-radius: 12px; margin: 12px 0;
}
.delete-btn {
    position: absolute; top: 12px; right: 16px;
    background: #fee2e2; color: #dc2626; border: none;
    border-radius: 50%; width: 28px; height: 28px;
    cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
}
.delete-btn:hover { background: #fca5a5; }
.toast {
    position: fixed; bottom: 30px; right: 30px;
    background: #1f2937; color: white; padding: 12px 20px;
    border-radius: 10px; font-size: 14px; opacity: 0;
    transition: opacity 0.3s; z-index: 100;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="container">
    <header>
        <h1 contenteditable="true" id="blog-title">Lea's Blog</h1>
        <p>Click anywhere to edit &bull; Use the toolbar to add posts</p>
    </header>

    <div class="toolbar">
        <button id="btn-new-post">+ New Post</button>
        <button id="btn-heading">+ Heading</button>
        <button id="btn-save">&#128190; Save</button>
    </div>

    <div id="posts">
        <div class="post">
            <div class="post-title" contenteditable="true">OOTD of the Summer &#9728;&#65039;</div>
            <div class="post-date">Summer 2026</div>
            <img class="post-img" src="./girl%20bathinsuit.jpeg" alt="Summer OOTD">
            <div class="post-body" contenteditable="true">Summer vibes! Drop your favourite summer looks in the comments. Click here to edit this text and write your own caption.</div>
            <button class="delete-btn" aria-label="Delete">&times;</button>
        </div>
    </div>
</div>

<div class="toast" id="toast">Saved!</div>

<script>
(function() {
    var STORAGE_KEY = "leas_blog_v1";
    var postsContainer = document.getElementById("posts");
    var toast = document.getElementById("toast");

    function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add("show");
        setTimeout(function() { toast.classList.remove("show"); }, 2000);
    }

    function getDateStr() {
        var d = new Date();
        var months = ["January","February","March","April","May","June",
                      "July","August","September","October","November","December"];
        return months[d.getMonth()] + " " + d.getDate() + ", " + d.getFullYear();
    }

    function createPost(title, date, body) {
        var div = document.createElement("div");
        div.className = "post";
        div.innerHTML = '<div class="post-title" contenteditable="true">' + title +
            '</div><div class="post-date">' + date +
            '</div><div class="post-body" contenteditable="true">' + body +
            '</div><button class="delete-btn" aria-label="Delete">&times;</button>';
        div.querySelector(".delete-btn").addEventListener("click", function() {
            div.remove(); saveData();
        });
        return div;
    }

    document.getElementById("btn-new-post").addEventListener("click", function() {
        var post = createPost("New Post Title", getDateStr(), "Start writing here...");
        postsContainer.prepend(post);
        post.querySelector(".post-title").focus();
        saveData();
        showToast("New post added!");
    });

    document.getElementById("btn-heading").addEventListener("click", function() {
        var div = document.createElement("div");
        div.className = "post";
        div.style.background = "linear-gradient(135deg, rgba(232,180,240,0.3), rgba(168,85,247,0.15))";
        div.innerHTML = '<div class="post-title" contenteditable="true" style="font-size:2rem;text-align:center;">Section Heading</div><button class="delete-btn" aria-label="Delete">&times;</button>';
        div.querySelector(".delete-btn").addEventListener("click", function() {
            div.remove(); saveData();
        });
        postsContainer.prepend(div);
        div.querySelector(".post-title").focus();
        saveData();
        showToast("Heading added!");
    });

    document.getElementById("btn-save").addEventListener("click", saveData);

    function saveData() {
        try {
            localStorage.setItem(STORAGE_KEY, postsContainer.innerHTML);
            localStorage.setItem(STORAGE_KEY + "_title",
                document.getElementById("blog-title").textContent);
        } catch(e) {}
        showToast("Blog saved!");
    }

    function loadData() {
        try {
            var d = localStorage.getItem(STORAGE_KEY);
            var t = localStorage.getItem(STORAGE_KEY + "_title");
            if (d) postsContainer.innerHTML = d;
            if (t) document.getElementById("blog-title").textContent = t;
            var btns = postsContainer.querySelectorAll(".delete-btn");
            for (var i = 0; i < btns.length; i++) {
                btns[i].addEventListener("click", function() {
                    this.parentElement.remove(); saveData();
                });
            }
        } catch(e) {}
    }

    var timer = null;
    postsContainer.addEventListener("input", function() {
        clearTimeout(timer);
        timer = setTimeout(saveData, 2000);
    });
    document.getElementById("blog-title").addEventListener("input", function() {
        clearTimeout(timer);
        timer = setTimeout(saveData, 2000);
    });

    loadData();
})();
</script>
</body>
</html>
